name: Build NetSphere Bridge

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      # ================= CHECKOUT =================
      - name: Checkout repo
        uses: actions/checkout@v4

      # ================= PYTHON =================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ================= DEBUG FILES =================
      - name: Show repository structure (DEBUG)
        run: ls -R

      # ================= MACOS FIX SYSTEM DEPS =================
      - name: Install macOS system deps
        if: matrix.os == 'macos-latest'
        run: |
          brew install libffi openssl

      # ================= INSTALL DEPENDENCIES =================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          pip install -r requirements.txt
          pip install cryptography --only-binary :all:

      # ================= WINDOWS BUILD =================
      - name: Build Windows (.exe)
        if: matrix.os == 'windows-latest'
        run: |
          python -m nuitka ^
            --onefile ^
            --standalone ^
            --windows-console-mode=disable ^
            --enable-plugin=tk-inter ^
            netsphere_bridge.py

      # ================= LINUX BUILD =================
      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m nuitka \
            --onefile \
            --standalone \
            --enable-plugin=tk-inter \
            netsphere_bridge.py

      # ================= MACOS BUILD (.app) =================
      - name: Build macOS (.app)
        if: matrix.os == 'macos-latest'
        run: |
          python -m nuitka \
            --standalone \
            --macos-create-app-bundle \
            --macos-app-icon=descarga.ico \
            --enable-plugin=tk-inter \
            ./netsphere_bridge.py

      # ================= UPLOAD ARTIFACTS =================
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            *.exe
            *.app
            dist/
