name: Build NetSphere Bridge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Nuitka
        run: |
          python -m pip install --upgrade pip
          pip install nuitka

      - name: Build Windows EXE
        if: matrix.os == 'windows-latest'
        run: |
          python -m nuitka ^
            --onefile ^
            --standalone ^
            --enable-plugin=tk-inter ^
            --windows-console-mode=disable ^
            --windows-icon-from-ico=descarga.ico ^
            netsphere_bridge.py

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m nuitka \
            --onefile \
            --standalone \
            --enable-plugin=tk-inter \
            netsphere_bridge.py

      - name: Build macOS (.app)
        if: matrix.os == 'macos-latest'
        run: |
          python -m nuitka \
            --standalone \
            --macos-create-app-bundle \
            --macos-app-icon=netsphere.icns \
            --enable-plugin=tk-inter \
            netsphere_bridge.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            **/*.exe
            **/*.app
            **/dist/**
