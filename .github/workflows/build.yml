name: Build NetSphere Bridge

on:
  push:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          pip install -r requirements.txt || true

      - name: Show files (DEBUG)
        run: |
          ls -R

      # =========================
      # WINDOWS BUILD (.exe)
      # =========================
      - name: Build Windows (.exe)
        if: matrix.os == 'windows-latest'
        run: |
          python -m nuitka ^
            --onefile ^
            --windows-console-mode=disable ^
            --windows-icon-from-ico=descarga.ico ^
            --enable-plugin=tk-inter ^
            netsphere_bridge.py

      # =========================
      # LINUX BUILD (binary)
      # =========================
      - name: Build Linux (binary)
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m nuitka \
            --onefile \
            --enable-plugin=tk-inter \
            netsphere_bridge.py

      # =========================
      # MACOS BUILD (.app)
      # =========================
      - name: Build macOS (.app)
        if: matrix.os == 'macos-latest'
        run: |
          python3 -m nuitka \
            --standalone \
            --macos-create-app-bundle \
            --macos-app-icon=descarga.ico \
            --enable-plugin=tk-inter \
            netsphere_bridge.py

      # =========================
      # Upload artifacts
      # =========================
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: netsphere-${{ matrix.os }}
          path: |
            *.exe
            *.bin
            *.app
            *.dist
