name: Build NetSphere Bridge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          pip install -r requirements.txt

      - name: Build macOS app
        run: |
          python -m nuitka netsphere_bridge.py \
            --standalone \
            --macos-create-app-bundle \
            --enable-plugin=tk-inter \
            --assume-yes-for-downloads \
            --output-dir=dist

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/*.app


  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          pip install -r requirements.txt

      - name: Build Windows exe
        run: |
          python -m nuitka netsphere_bridge.py `
            --standalone `
            --onefile `
            --enable-plugin=tk-inter `
            --assume-yes-for-downloads `
            --output-dir=dist

      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe


  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          pip install -r requirements.txt

      - name: Build Linux
        run: |
          python -m nuitka netsphere_bridge.py \
            --standalone \
            --onefile \
            --enable-plugin=tk-inter \
            --assume-yes-for-downloads \
            --output-dir=dist

      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/*
