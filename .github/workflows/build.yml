name: Build NetSphere Bridge

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          pip install -r requirements.txt

      # ================= WINDOWS =================
      - name: Build Windows EXE
        if: matrix.os == 'windows-latest'
        run: |
          python -m nuitka ^
            --onefile ^
            --standalone ^
            --windows-console-mode=disable ^
            --enable-plugin=tk-inter ^
            --include-data-file=descarga.ico=descarga.ico ^
            netsphere_bridge.py

      # ================= LINUX =================
      - name: Build Linux binary
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m nuitka \
            --onefile \
            --standalone \
            --enable-plugin=tk-inter \
            netsphere_bridge.py

      # ================= MACOS (.app) =================
      - name: Build macOS (.app)
        if: matrix.os == 'macos-latest'
        run: |
          python3 -m nuitka \
            --standalone \
            --macos-create-app-bundle \
            --macos-app-icon=descarga.ico \
            --enable-plugin=tk-inter \
            netsphere_bridge.py

      # ================= ARTIFACT =================
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: netsphere-${{ matrix.os }}
          path: |
            *.exe
            *.app
            dist/
